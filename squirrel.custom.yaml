patch:
  show_notifications_when: appropriate # 状态通知，适当，也可设为全开（always）全关（never）
  style:
    candidate_list_layout: linear # 定义是否水平
    inline_preedit: true # 启用内嵌编码, 既首行显示拼音
    color_scheme: self_style # 定义主题
    candidate_format: "%c\u2005%@" # 用 1/6 em 空格 U+2005 来控制编号 %c 和候选词 %@ 前后的空间。

  preset_color_schemes:
    self_style:
      corner_radius: 5 # 候选条圆角半径
      border_height: 0 # 窗口边界高度，大于圆角半径才生效
      border_width: 0 # 窗口边界宽度，大于圆角半径才生效
      back_color: 0xFFFFFF # 候选条背景色
      border_color: 0xE0B693 # 边框色
      font_face: "PingFangSC" # 候选词字体
      font_point: 16 # 预选栏文字字号
      label_font_face: "PingFangSC" # 候选词编号字体
      label_font_point: 14 # 预选栏编号字号
      candidate_text_color: 0x000000 # 预选项文字颜色
      text_color: 0x000000 # 拼音行文字颜色，24位色值，16进制，BGR顺序
      comment_text_color: 0x999999 # 拼音等提示文字颜色
      hilited_text_color: 0xFF6941 # 高亮拼音 (需要开启内嵌编码)
      hilited_candidate_text_color: 0xFF6941 # 第一候选项文字颜色
      hilited_candidate_back_color: 0xFFFFFF # 第一候选项背景色
      hilited_comment_text_color: 0xFF6941 # 注解文字高亮

    psionics:
      name: 幽能／Psionics
      author: 雨過之後、佛振
      corner_radius: 5 # 候选条圆角半径
      border_height: 0 # 窗口边界高度，大于圆角半径才生效
      border_width: 0 # 窗口边界宽度，大于圆角半径才生效
      font_face: "Lucida Grande" # 候选词字体
      font_point: 16 # 预选栏文字字号
      label_font_face: "PingFangSC" # 候选词编号字体
      label_font_point: 14 # 预选栏编号字号
      text_color: 0xc2c2c2
      back_color: 0x444444
      candidate_text_color: 0xeeeeee
      hilited_text_color: 0xeeeeee
      hilited_back_color: 0x444444
      hilited_candidate_label_color: 0xfafafa
      hilited_candidate_text_color: 0xfafafa
      hilited_candidate_back_color: 0xd8bf00
      comment_text_color: 0x808080
      hilited_comment_text_color: 0x444444

  app_options:
