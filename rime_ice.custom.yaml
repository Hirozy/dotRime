patch:
  # 开关
  # reset: 默认状态。注释掉后，切换窗口时不会重置到默认状态。
  # states: 方案选单显示的名称。可以注释掉，仍可以通过快捷键切换。
  # abbrev: 默认的缩写取 states 的第一个字符，abbrev 可自定义一个字符
  switches:
    - name: ascii_mode
      reset: 0
      states: ["中文", "A"]
    - name: full_shape
      reset: 0
      states: ["半角", "全角"]
    - name: traditionalization
      reset: 0
      states: ["简", "繁"]
    - name: ascii_punct
      reset: 1
      states: ["。，", ", ."]
    - options: ["UTF8", "GBK", "GB2312"]
      reset: 0
      states:
        - UTF-8
        - GBK
        - GB2312