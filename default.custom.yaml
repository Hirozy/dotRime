patch:
  menu:
    page_size: 8
  schema_list:
    - schema: rime_ice

  ascii_composer:
    good_old_caps_lock: false # capslock 键切换英文并输出小写
    switch_key:
      Control_L: noop
      Control_R: noop
      Shift_L: commit_code
      Shift_R: noop

  switcher:
    abbreviate_options: true
    caption: "〔方案选单〕"
    fold_options: false # 选项菜单是否折叠显示
    hotkeys:
      - F4
    option_list_separator: "\x10/"
    save_options:
      - full_shape
      - ascii_punct
      - simplification
      - extended_charset
